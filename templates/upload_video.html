{% extends "layout.html" %}
{% block content %}

<div class="upload-wrapper">
    <h2 class="page-title"><i class="fa-solid fa-video" style="font-size:22px;color:var(--accent-2);"></i> Video Attendance</h2>
    <p class="page-subtitle">Upload a classroom video to detect and mark attendance for recognized students.</p>

    <div class="upload-card">
        <form method="POST" enctype="multipart/form-data">

            <div class="mb-3">
                <label class="form-label">Classroom Video</label>
                <input type="file"
                       name="video"
                       accept="video/*"
                       class="form-control"
                       required>
            </div>

            <button type="submit"
                    class="btn btn-primary w-100">
                <i class="fa fa-check"></i>
                Mark Attendance
            </button>

        </form>
    </div>
</div>

{% if names %}
<div class="upload-wrapper mt-4">
    <div class="upload-card">
        <div class="alert alert-success mb-0">
            <b>Attendance Marked For:</b>
            <ul class="mt-2 mb-0">
                {% for n in names %}
                <li>{{ n }}</li>
                {% endfor %}
            </ul>
        </div>
    </div>
</div>
{% endif %}

{% endblock %}
