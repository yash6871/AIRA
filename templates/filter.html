{% extends "layout.html" %}
{% block content %}

<h2 class="page-title">
    <i class="fa fa-filter"></i> Filter Attendance
</h2>

<form method="POST" class="row g-3 mb-4">

    <div class="col-md-4">
        <input type="text" name="roll" class="form-control"
               placeholder="Enter Roll Number">
    </div>

    <div class="col-md-4">
        <input type="date" name="date" class="form-control">
    </div>

    <div class="col-md-4">
        <button class="btn btn-primary w-100">
            <i class="fa fa-search"></i> Filter
        </button>
    </div>

</form>

{% if data %}
<table class="table table-dark table-striped">
    <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Roll</th>
            <th>Date</th>
            <th>Time</th>
        </tr>
    </thead>
    <tbody>
    {% for r in data %}
        <tr>
            <td>{{ r[0] }}</td>
            <td>{{ r[1] }}</td>
            <td>{{ r[2] }}</td>
            <td>{{ r[3] }}</td>
            <td>{{ r[4] }}</td>
        </tr>
    {% endfor %}
    </tbody>
</table>
{% else %}
<p class="text-muted text-center">No records found</p>
{% endif %}

{% endblock %}
