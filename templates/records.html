{% extends "layout.html" %}
{% block content %}

<h1 class="page-title"><i class="fa fa-table" style="font-size:22px;color:var(--accent-2);"></i> Attendance Records</h1>
<p class="page-subtitle">Browse and filter attendance history by batch.</p>

<!-- 🔽 Batch Filter Dropdown -->
<form method="get" style="max-width:280px; margin-bottom:22px;">
    <select name="batch"
            class="form-control"
            onchange="this.form.submit()">

        <option value="ALL"
        {% if selected_batch == "ALL" %}selected{% endif %}>
            All Batches
        </option>

        {% for b in batches %}
        <option value="{{ b }}"
        {% if selected_batch == b %}selected{% endif %}>
            {{ b }}
        </option>
        {% endfor %}
    </select>
</form>


<div class="table-container">
    <table class="table table-dark table-hover rounded overflow-hidden">
        <thead>
<tr>
  <th>ID</th>
  <th>Name</th>
  <th>Roll</th>
  <th>Batch</th>
  <th>Date</th>
  <th>Time</th>
  <th>Confidence</th>
</tr>
</thead>

        <tbody>
{% for r in data %}
<tr>
  <td>{{ r[0] }}</td>
  <td>{{ r[1] }}</td>
  <td>{{ r[2] }}</td>
  <td>
    <span class="badge bg-info">{{ r[3] }}</span>
  </td>
  <td>{{ r[4] }}</td>
  <td>{{ r[5] }}</td>
  <td>{{ r[6] }}%</td>
</tr>
{% endfor %}
</tbody>

    </table>
</div>

{% endblock %}
